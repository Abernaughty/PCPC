# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This repo is a pnpm workspace (pnpm-workspace.yaml at root) whose members are
# `frontend`, `backend/functions`, and `backend/shared`. The root pnpm-lock.yaml
# coordinates dependency resolution across all members. Per-member npm blocks
# (`directory: /frontend`, `/backend/shared`) would edit only the member's
# package.json without updating the root pnpm-lock, so `pnpm install
# --frozen-lockfile` at deploy time (Vercel) fails with ERR_PNPM_OUTDATED_LOCKFILE.
# So: one root `npm` block handles pnpm-coordinated updates for the entire
# workspace (frontend + backend/shared + root devDeps).
#
# `backend/functions` is the exception: it is a pnpm workspace member AND it
# ships via `npm ci` in CI (per repo contract — see backend/functions/package.json
# with `"@pcpc/shared": "file:../shared"`). It has its own package-lock.json
# that the deploy pipeline consumes. So it needs its OWN `npm` block scoped
# to `/backend/functions` to keep package-lock.json fresh. This produces some
# duplicate-PR overlap for shared deps (root block + functions block may both
# propose the same bump) — that's accepted as the price of supporting the
# dual-lockfile pattern.

version: 2

updates:
  # Workspace root (pnpm) — coordinates pnpm-lock.yaml across frontend +
  # backend/shared + root devDeps. Highest churn surface.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    groups:
      # Roll minor/patch into one PR per week to cut noise
      minor-and-patch:
        update-types: [minor, patch]

  # backend/functions (npm) — owns package-lock.json for the `npm ci` deploy
  # path. Distinct ecosystem from the pnpm workspace; do not consolidate.
  - package-ecosystem: npm
    directory: /backend/functions
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Dockerfile base image (Azure Functions Node 22 image gets CVE patches)
  - package-ecosystem: docker
    directory: /backend/functions
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
