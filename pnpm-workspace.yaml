packages:
  - "frontend"
  - "backend/shared"
  - "backend/functions"

# backend/functions is a full pnpm-workspace member. It is deployed via
# `pnpm --filter pcpc-backend deploy --prod <dir>` (build time), which produces
# a self-contained folder (dist + host.json + package.json + a prod node_modules)
# consumed by BOTH the Function App deploy and the ACA container image — so there
# is no `npm ci` deploy and no separate package-lock.json to drift. This
# supersedes PR #194's split (which kept a second npm lockfile because the deploy
# used `npm ci`; that rationale no longer applies under `pnpm deploy`).
