# PCPC Multi-Stage CD Pipeline
# Build once, deploy to Dev → Staging → Prod with approval gates
# Uses unified artifact strategy for consistency across environments

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - "app/**"
      - "backend/**"
      - "infra/**"
      - "apim/**"
      - "pipelines/ado/**"
    exclude:
      - "**/*.md"
      - "docs/**"
      - "tests/**"

pr: none # PR validation handled by azure-pipelines-pr.yml

variables:
  - template: variables/ci-images.yml
  - group: vg-pcpc-dev-config
  - group: vg-pcpc-dev-secrets
  - group: vg-pcpc-staging-config
  - group: vg-pcpc-staging-secrets
  - group: vg-pcpc-prod-config
  - group: vg-pcpc-prod-secrets
  - name: buildConfiguration
    value: "Release"
  - name: nodeVersion
    value: "22.x"

resources:
  containers:
    - container: node-azure
      image: $(CI_IMAGE_NODE_AZURE)
      endpoint: pcpc-acr-service-connection
    - container: terraform
      image: $(CI_IMAGE_TERRAFORM)
      endpoint: pcpc-acr-service-connection

stages:
  # ============================================================================
  # STAGE 1: BUILD
  # Create unified artifact with all components + container image
  # ============================================================================
  - stage: Build
    displayName: "Build Unified Artifact"
    jobs:
      - template: templates/build.yml
        parameters:
          buildConfiguration: $(buildConfiguration)
          nodeVersion: $(nodeVersion)
          azureSubscription: "az-pcpc-dev"
          apimName: "pcpc-apim-dev"
          apimResourceGroup: "pcpc-rg-dev"
          apimBaseUrl: "https://pcpc-apim-dev.azure-api.net/pcpc-api"
          apimBasePath: "pcpc-api"
          useApiManagement: "true"
          functionAppName: $(FUNCTION_APP_NAME)
          functionResourceGroup: $(APIM_RESOURCE_GROUP)

      # Build the Path C (ACA) container image and push to PCPC's ACR. Runs
      # in parallel with the unified-artifact build above — they're
      # independent. Moved out of Deploy_Dev (where it used to live inside
      # Deploy_ACA) so the image exists in ACR *before* any Deploy_* stage
      # runs Terraform; this unblocks adding ACA jobs to staging/prod (the
      # Container App resource needs an image to exist on first apply).
      #
      # The image is built once and pushed to the dev-owned ACR; downstream
      # ACA deploy jobs (Deploy_Dev/Staging/Prod) consume the canonical
      # SHA-tagged reference via the stageDependencies output below. How
      # staging/prod's own ACRs get the bits (cross-env AcrPull RBAC vs
      # `az acr import`) is a PR 3 concern — out of scope here.
      #
      # No `container:` directive — the job needs host Docker daemon access
      # for `docker build` and the Trivy container-scan flow.
      - job: Build_Container_Image
        displayName: "Build + Push ACA Image"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - template: templates/build-and-push-image.yml
            parameters:
              azureSubscription: "az-pcpc-dev"
              acrResourceGroup: "pcpc-rg-dev"

  # ============================================================================
  # STAGE 2: DEPLOY TO DEV
  # Automatic deployment to development environment
  # ============================================================================
  - stage: Deploy_Dev
    displayName: "Deploy to Dev"
    dependsOn: Build
    condition: succeeded()
    variables:
      - group: vg-pcpc-dev-config
      - group: vg-pcpc-dev-secrets
    jobs:
      # Deploy Infrastructure
      - job: Deploy_Infrastructure
        displayName: "Deploy Infrastructure"
        pool:
          vmImage: "ubuntu-latest"
        container: terraform
        steps:
          - template: templates/deploy-infra.yml
            parameters:
              environment: dev
              azureSubscription: "az-pcpc-dev"
              terraformVersion: "1.13.3"

      # Deploy Backend Functions
      - job: Deploy_Functions
        displayName: "Deploy Azure Functions"
        dependsOn: Deploy_Infrastructure
        condition: succeeded()
        pool:
          vmImage: "ubuntu-latest"
        container: node-azure
        steps:
          - template: templates/deploy-functions.yml
            parameters:
              environment: dev
              azureSubscription: "az-pcpc-dev"
              functionAppName: $(FUNCTION_APP_NAME)
              resourceGroupName: $(APIM_RESOURCE_GROUP)

      # Deploy APIM APIs and Policies
      - job: Deploy_APIM
        displayName: "Deploy APIM APIs & Policies"
        dependsOn:
          - Deploy_Infrastructure
          - Deploy_Functions
        condition: succeeded()
        pool:
          vmImage: "ubuntu-latest"
        container: terraform
        steps:
          - template: templates/deploy-apim.yml
            parameters:
              environment: dev
              azureSubscription: "az-pcpc-dev"

      # Phase 2.2 — Deploy Path C (ACA Container).
      #
      # Parallel to Deploy_Functions (Path B). Consumes the canonical
      # SHA-tagged image reference from the Build stage's
      # `Build_Container_Image` job (cross-stage `stageDependencies` output)
      # and rolls a new revision on the Container App. The image-build
      # itself lives in the Build stage so that future Deploy_Staging /
      # Deploy_Prod ACA jobs can consume the same artifact.
      #
      # `dependsOn: Deploy_Infrastructure` so Terraform has provisioned
      # the Container App before we try to roll it. (Build stage already
      # completed by the time Deploy_Dev runs — that's the stage-level
      # dependsOn at the parent.)
      - job: Deploy_ACA
        displayName: "Deploy Path C (ACA Container)"
        dependsOn: Deploy_Infrastructure
        condition: succeeded()
        pool:
          vmImage: "ubuntu-latest"
        variables:
          # Map the Build stage's image-build job output to a job-scoped
          # variable so we can pass it as a runtime parameter below.
          containerImageReference: $[ stageDependencies.Build.Build_Container_Image.outputs['discover_image.ContainerImageReference'] ]
        steps:
          - template: templates/deploy-aca.yml
            parameters:
              environment: dev
              azureSubscription: "az-pcpc-dev"
              containerAppName: "pcpc-aca-dev"
              resourceGroupName: $(APIM_RESOURCE_GROUP)
              containerImageReference: $(containerImageReference)

      # Run Smoke Tests
      - job: Smoke_Tests
        displayName: "Run Smoke Tests"
        dependsOn:
          - Deploy_Functions
          - Deploy_APIM
        condition: succeeded()
        pool:
          vmImage: "ubuntu-latest"
        container: node-azure
        steps:
          - template: templates/smoke-tests.yml
            parameters:
              environment: dev
              azureSubscription: "az-pcpc-dev"
              resourceGroupName: $(APIM_RESOURCE_GROUP)
              functionAppName: $(FUNCTION_APP_NAME)
              apimName: $(APIM_NAME)

  # ============================================================================
  # STAGE 3: DEPLOY TO STAGING
  # Approval-gated deployment to staging environment
  # ============================================================================
  - stage: Deploy_Staging
    displayName: "Deploy to Staging"
    dependsOn: Deploy_Dev
    condition: succeeded()
    variables:
      - group: vg-pcpc-staging-config
      - group: vg-pcpc-staging-secrets
    jobs:
      # Deploy Infrastructure
      - deployment: Deploy_Infrastructure
        displayName: "Deploy Infrastructure"
        environment: pcpc-staging # Approval gate configured in Azure DevOps
        pool:
          vmImage: "ubuntu-latest"
        container: terraform
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/deploy-infra.yml
                  parameters:
                    environment: staging
                    azureSubscription: "az-pcpc-staging"
                    terraformVersion: "1.13.3"

      # Deploy Backend Functions
      - job: Deploy_Functions
        displayName: "Deploy Azure Functions"
        dependsOn: Deploy_Infrastructure
        condition: succeeded()
        pool:
          vmImage: "ubuntu-latest"
        container: node-azure
        steps:
          - template: templates/deploy-functions.yml
            parameters:
              environment: staging
              azureSubscription: "az-pcpc-staging"
              functionAppName: $(FUNCTION_APP_NAME)
              resourceGroupName: $(APIM_RESOURCE_GROUP)

      # Deploy APIM APIs and Policies
      - job: Deploy_APIM
        displayName: "Deploy APIM APIs & Policies"
        dependsOn:
          - Deploy_Functions
        condition: succeeded()
        pool:
          vmImage: "ubuntu-latest"
        container: terraform
        steps:
          - template: templates/deploy-apim.yml
            parameters:
              environment: staging
              azureSubscription: "az-pcpc-staging"

      # Run Smoke Tests
      - job: Smoke_Tests
        displayName: "Run Smoke Tests"
        dependsOn:
          - Deploy_Functions
          - Deploy_APIM
        condition: succeeded()
        pool:
          vmImage: "ubuntu-latest"
        container: node-azure
        steps:
          - template: templates/smoke-tests.yml
            parameters:
              environment: staging
              azureSubscription: "az-pcpc-staging"
              resourceGroupName: $(APIM_RESOURCE_GROUP)
              functionAppName: $(FUNCTION_APP_NAME)
              apimName: $(APIM_NAME)

  # ============================================================================
  # STAGE 4: DEPLOY TO PRODUCTION
  # Approval-gated deployment to production environment
  # ============================================================================
  - stage: Deploy_Prod
    displayName: "Deploy to Production"
    dependsOn: Deploy_Staging
    condition: succeeded()
    variables:
      - group: vg-pcpc-prod-config
      - group: vg-pcpc-prod-secrets
    jobs:
      # Deploy Infrastructure
      - deployment: Deploy_Infrastructure
        displayName: "Deploy Infrastructure"
        environment: pcpc-prod # Approval gate configured in Azure DevOps
        pool:
          vmImage: "ubuntu-latest"
        container: terraform
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/deploy-infra.yml
                  parameters:
                    environment: prod
                    azureSubscription: "az-pcpc-prod"
                    terraformVersion: "1.13.3"

      # Deploy Backend Functions
      - job: Deploy_Functions
        displayName: "Deploy Azure Functions"
        dependsOn: Deploy_Infrastructure
        condition: succeeded()
        pool:
          vmImage: "ubuntu-latest"
        container: node-azure
        steps:
          - template: templates/deploy-functions.yml
            parameters:
              environment: prod
              azureSubscription: "az-pcpc-prod"
              functionAppName: $(FUNCTION_APP_NAME)
              resourceGroupName: $(APIM_RESOURCE_GROUP)

      # Deploy APIM APIs and Policies
      - job: Deploy_APIM
        displayName: "Deploy APIM APIs & Policies"
        dependsOn:
          - Deploy_Functions
        condition: succeeded()
        pool:
          vmImage: "ubuntu-latest"
        container: terraform
        steps:
          - template: templates/deploy-apim.yml
            parameters:
              environment: prod
              azureSubscription: "az-pcpc-prod"

      # Run Smoke Tests
      - job: Smoke_Tests
        displayName: "Run Smoke Tests"
        dependsOn:
          - Deploy_Functions
          - Deploy_APIM
        condition: succeeded()
        pool:
          vmImage: "ubuntu-latest"
        container: node-azure
        steps:
          - template: templates/smoke-tests.yml
            parameters:
              environment: prod
              azureSubscription: "az-pcpc-prod"
              resourceGroupName: $(APIM_RESOURCE_GROUP)
              functionAppName: $(FUNCTION_APP_NAME)
              apimName: $(APIM_NAME)

      # Final Deployment Summary
      - job: Deployment_Summary
        displayName: "Deployment Summary"
        dependsOn: Smoke_Tests
        condition: succeeded()
        pool:
          vmImage: "ubuntu-latest"
        container: node-azure
        steps:
          - checkout: none
          - script: |
              echo "=========================================="
              echo "PRODUCTION DEPLOYMENT COMPLETE"
              echo "=========================================="
              echo ""
              echo "Environment: Production"
              echo "Build ID: $(Build.BuildId)"
              echo "Build Number: $(Build.BuildNumber)"
              echo "Source Branch: $(Build.SourceBranch)"
              echo "Source Version: $(Build.SourceVersion)"
              echo ""
              echo "Deployed Components:"
              echo "  ✓ Infrastructure (Terraform)"
              echo "  ✓ Azure Functions Backend"
              echo "  ✓ APIM APIs & Policies"
              echo ""
              echo "All smoke tests passed successfully."
              echo "=========================================="
            displayName: "Display Deployment Summary"
