# PCPC Multi-Stage CD Pipeline
# Build once, deploy to Dev → Staging → Prod with approval gates
# Uses unified artifact strategy for consistency across environments

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - "app/**"
      - "backend/**"
      - "infra/**"
      - "apim/**"
      - "pipelines/ado/**"
    exclude:
      - "**/*.md"
      - "docs/**"
      - "tests/**"

pr: none # PR validation handled by azure-pipelines-pr.yml

variables:
  # NOTE: Environment variable groups (vg-pcpc-<env>-config/secrets) are
  # deliberately NOT loaded here at pipeline scope. Loading them globally would
  # put prod secrets in scope for the auto-deploying (un-gated) Deploy_Dev jobs.
  # Each Deploy_* stage declares only its own env's groups below, so secrets
  # never cross environment boundaries. The Build stage needs no env groups.
  - template: variables/ci-images.yml
  - template: variables/versions.yml
  - name: buildConfiguration
    value: "Release"
  - name: nodeVersion
    value: "22.x"

resources:
  containers:
    - container: node-azure
      image: $(CI_IMAGE_NODE_AZURE)
      endpoint: pcpc-acr-service-connection
    - container: terraform
      image: $(CI_IMAGE_TERRAFORM)
      endpoint: pcpc-acr-service-connection

stages:
  # ============================================================================
  # STAGE 1: BUILD
  # Create unified artifact with all components + container image
  # ============================================================================
  - stage: Build
    displayName: "Build Unified Artifact"
    jobs:
      - template: templates/build.yml
        parameters:
          buildConfiguration: $(buildConfiguration)
          nodeVersion: $(nodeVersion)

      # Build the Path C (ACA) container image and push to PCPC's shared ACR.
      # Runs in parallel with the unified-artifact build above — they're
      # independent. Moved out of Deploy_Dev (PR #167) so the image exists in
      # ACR *before* any Deploy_* stage runs Terraform; that unblocks adding
      # ACA jobs to staging/prod (the Container App resource needs an image
      # to exist on first apply).
      #
      # The image is built once and pushed to the shared ACR
      # (`pcpc-rg-shared`); dev/staging/prod ACA jobs consume the canonical
      # SHA-tagged reference via the stageDependencies output below. The
      # shared-RG ACR (PR 2.5) means all three envs pull symmetrically — no
      # cross-env RBAC pointing at any single env's RG.
      #
      # No `container:` directive — the job needs host Docker daemon access
      # for `docker build` and the Trivy container-scan flow.
      - job: Build_Container_Image
        displayName: "Build + Push ACA Image"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - template: templates/build-and-push-image.yml
            parameters:
              azureSubscription: "az-pcpc-dev"
              acrResourceGroup: "pcpc-rg-shared"

  # ============================================================================
  # DEPLOY STAGES (dev → staging → prod)
  # Each environment is one invocation of templates/deploy-stage.yml — the
  # ~110-line stage body used to be copy-pasted three times (audit D1/D2).
  # `Build` is in every stage's dependsOn so the Deploy_ACA job can read the
  # cross-stage Build_Container_Image output variable (image built once, rolled
  # to all three envs). Execution order is preserved by the staged dependsOn.
  # ============================================================================

  # STAGE 2: DEPLOY TO DEV — automatic, no approval gate.
  - template: templates/deploy-stage.yml
    parameters:
      stageName: Deploy_Dev
      displayName: "Deploy to Dev"
      environment: dev
      azureSubscription: "az-pcpc-dev"
      containerAppName: "pcpc-aca-dev"
      requiresApproval: false
      dependsOn:
        - Build

  # STAGE 3: DEPLOY TO STAGING — approval-gated via the pcpc-staging Environment.
  - template: templates/deploy-stage.yml
    parameters:
      stageName: Deploy_Staging
      displayName: "Deploy to Staging"
      environment: staging
      azureSubscription: "az-pcpc-staging"
      containerAppName: "pcpc-aca-staging"
      requiresApproval: true
      dependsOn:
        - Build
        - Deploy_Dev

  # STAGE 4: DEPLOY TO PRODUCTION — approval-gated via the pcpc-prod Environment.
  - template: templates/deploy-stage.yml
    parameters:
      stageName: Deploy_Prod
      displayName: "Deploy to Production"
      environment: prod
      azureSubscription: "az-pcpc-prod"
      containerAppName: "pcpc-aca-prod"
      requiresApproval: true
      includeSummary: true
      dependsOn:
        - Build
        - Deploy_Staging
