# Unified Build Template
# Creates a single artifact containing backend Functions, APIM config, and release metadata
# This artifact is promoted through Dev → Staging → Prod environments

parameters:
  - name: buildConfiguration
    type: string
    default: "Release"
  - name: nodeVersion
    type: string
    default: "22.x"
  - name: publishArtifact
    type: boolean
    default: true

jobs:
  - job: Build
    displayName: "Build Unified Artifact"
    pool:
      vmImage: "ubuntu-latest"
    container: node-azure
    steps:
      # ============================================================================
      # BACKEND BUILD + BUNDLE
      # ============================================================================

      # Install + build + pnpm deploy --prod into drop/functions. Shared recipe
      # with the ACA image build — see templates/steps/bundle-functions.yml.
      - template: steps/bundle-functions.yml
        parameters:
          deployDir: "$(Build.ArtifactStagingDirectory)/drop/functions"

      # ============================================================================
      # CREATE UNIFIED ARTIFACT
      # ============================================================================

      - script: |
          echo "Creating unified artifact structure..."

          # functions/ was produced by the bundle step above; only pre-create
          # the apim/ subtree here.
          mkdir -p $(Build.ArtifactStagingDirectory)/drop/apim

          echo "Artifact structure:"
          tree -L 2 $(Build.ArtifactStagingDirectory)/drop || ls -R $(Build.ArtifactStagingDirectory)/drop
        displayName: "Create Artifact Structure"

      # Copy APIM configuration
      - task: CopyFiles@2
        displayName: "Copy APIM Config to Artifact"
        inputs:
          SourceFolder: "$(System.DefaultWorkingDirectory)/apim"
          Contents: |
            specs/**
            policies/**
            terraform/**
            environments/**
          TargetFolder: "$(Build.ArtifactStagingDirectory)/drop/apim"
          CleanTargetFolder: false

      # Create release manifest with build metadata.
      #
      # Built with `jq -n --arg` rather than an inline heredoc so that
      # free-form fields (notably the commit message) are JSON-escaped and
      # never interpreted by the shell. Values arrive via env: (below) — ADO
      # expands the macros into environment variables, which bash treats as
      # inert data — instead of being substituted into the script body. This
      # closes the command/JSON-injection vector a crafted commit message
      # would otherwise open (audit finding S2).
      - script: |
          set -euo pipefail
          jq -n \
            --arg buildId "$BUILD_ID" \
            --arg buildNumber "$BUILD_NUMBER" \
            --arg sourceVersion "$SOURCE_VERSION" \
            --arg sourceBranch "$SOURCE_BRANCH" \
            --arg buildTimestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg buildConfiguration "$BUILD_CONFIGURATION" \
            --arg repository "$REPOSITORY" \
            --arg commitMessage "$COMMIT_MESSAGE" \
            --arg triggeredBy "$TRIGGERED_BY" \
            --arg nodeVersion "$NODE_VERSION" \
            '{
              buildId: $buildId,
              buildNumber: $buildNumber,
              sourceVersion: $sourceVersion,
              sourceBranch: $sourceBranch,
              buildTimestamp: $buildTimestamp,
              buildConfiguration: $buildConfiguration,
              repository: $repository,
              commitMessage: $commitMessage,
              triggeredBy: $triggeredBy,
              components: {
                backend: {
                  path: "functions/",
                  technology: "Azure Functions v4",
                  runtime: ("Node.js " + $nodeVersion)
                },
                apim: {
                  path: "apim/",
                  technology: "Terraform + OpenAPI"
                }
              }
            }' > "$(Build.ArtifactStagingDirectory)/drop/release.json"

          echo "Release manifest created:"
          cat "$(Build.ArtifactStagingDirectory)/drop/release.json"
        displayName: "Create Release Manifest"
        env:
          BUILD_ID: $(Build.BuildId)
          BUILD_NUMBER: $(Build.BuildNumber)
          SOURCE_VERSION: $(Build.SourceVersion)
          SOURCE_BRANCH: $(Build.SourceBranch)
          BUILD_CONFIGURATION: ${{ parameters.buildConfiguration }}
          REPOSITORY: $(Build.Repository.Name)
          COMMIT_MESSAGE: $(Build.SourceVersionMessage)
          TRIGGERED_BY: $(Build.RequestedFor)
          NODE_VERSION: ${{ parameters.nodeVersion }}

      # Create checksums for artifact integrity verification
      - script: |
          cd $(Build.ArtifactStagingDirectory)/drop

          echo "Generating checksums for artifact integrity..."
          find . -type f -not -name "checksums.txt" -exec sha256sum {} \; > checksums.txt

          echo "Checksums generated:"
          head -20 checksums.txt
          echo "..."
          echo "Total files: $(wc -l < checksums.txt)"
        displayName: "Generate Artifact Checksums"

      # Display artifact summary
      - script: |
          echo "=========================================="
          echo "UNIFIED ARTIFACT SUMMARY"
          echo "=========================================="
          echo ""
          echo "Artifact Location: $(Build.ArtifactStagingDirectory)/drop"
          echo ""
          echo "Directory Structure:"
          tree -L 3 $(Build.ArtifactStagingDirectory)/drop || ls -R $(Build.ArtifactStagingDirectory)/drop
          echo ""
          echo "Artifact Size:"
          du -sh $(Build.ArtifactStagingDirectory)/drop
          echo ""
          echo "Component Sizes:"
          du -sh $(Build.ArtifactStagingDirectory)/drop/functions
          du -sh $(Build.ArtifactStagingDirectory)/drop/apim
          echo ""
          echo "=========================================="
        displayName: "Display Artifact Summary"

      # Publish unified artifact.
      #
      # PublishPipelineArtifact (not the legacy PublishBuildArtifacts) — the
      # latter registers every file with the build container one-by-one over
      # REST ("Associating files"), which took ~21 min for this artifact's
      # ~30k bundled node_modules files. Pipeline artifacts use a dedup store +
      # manifest (no per-file association) and are Microsoft's recommended task.
      - task: PublishPipelineArtifact@1
        displayName: "Publish Unified Artifact"
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)/drop"
          artifact: "drop"
          publishLocation: "pipeline"
        condition: and(succeeded(), eq('${{ parameters.publishArtifact }}', 'true'))
