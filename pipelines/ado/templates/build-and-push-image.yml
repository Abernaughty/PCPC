# Build and Push PCPC Functions ACA Image
#
# Phase 2.2 + polish PR. Builds the Functions container from
# backend/functions/Dockerfile, scans for HIGH+ CVEs with Trivy (blocking),
# and pushes to the PCPC-owned ACR under the pcpc/functions repository path.
#
# The ACR name is discovered at runtime by listing registries in the
# workload RG and matching the `pcpcacr*` naming convention — Terraform
# names the registry with a random suffix to satisfy global uniqueness,
# so the bare name isn't known at pipeline-config time. The RG is stable.
# Authentication uses `az acr login` (managed identity flow) rather than
# a Docker registry service connection — the ADO SP has AcrPush on the
# new ACR via a role assignment in the same Terraform state.
#
# Output variables (consumed by the deploy-aca.yml template that follows
# in the same job):
#   ContainerImageReference  — full registry/repo:tag of the canonical
#                              (git-SHA-tagged) image to deploy
#   ContainerImageDigest     — sha256:... digest of the pushed image, for
#                              optional pin verification
#
# Usage:
#   - template: pipelines/ado/templates/build-and-push-image.yml
#     parameters:
#       azureSubscription: az-pcpc-dev
#       acrResourceGroup: pcpc-rg-dev
#       imageRepository: pcpc/functions
#       trivySeverity: HIGH,CRITICAL
#       trivyVersion: "0.59.1"

parameters:
  - name: azureSubscription
    type: string
  - name: acrResourceGroup
    type: string
    # Workload RG that owns the PCPC ACR. The registry name itself is
    # derived from a randomized suffix at Terraform-apply time, so we
    # discover it at runtime via `az acr list` against this RG.
  - name: acrNamePrefix
    type: string
    default: pcpcacr
    # Filter so the discovery degrades gracefully if other ACRs ever
    # end up co-located in the same RG.
  - name: imageRepository
    type: string
    default: pcpc/functions
  - name: trivySeverity
    type: string
    default: "HIGH,CRITICAL"
  - name: trivyVersion
    type: string
    default: "0.59.1"

steps:
  - checkout: self

  # ---------------------------------------------------------------------------
  # Discover the PCPC ACR in the workload RG, resolve login server, and
  # compute image tags. The ACR name carries a random suffix from
  # Terraform's random_string, so we filter by the stable `pcpcacr*` prefix.
  # ---------------------------------------------------------------------------
  - task: AzureCLI@2
    displayName: "Discover ACR + Compute Image Tags"
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        RG='${{ parameters.acrResourceGroup }}'
        PREFIX='${{ parameters.acrNamePrefix }}'
        REPO='${{ parameters.imageRepository }}'

        echo "Discovering ACR in RG '$RG' with name prefix '$PREFIX'..."
        ACR_NAME=$(az acr list -g "$RG" --query "[?starts_with(name, '$PREFIX')].name | [0]" -o tsv)

        if [ -z "$ACR_NAME" ] || [ "$ACR_NAME" = "null" ]; then
          echo "##vso[task.logissue type=error]No ACR found in RG '$RG' with name prefix '$PREFIX'. Has the infra stage run?"
          exit 1
        fi

        FQDN=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)
        SHORT_SHA="$(echo '$(Build.SourceVersion)' | cut -c1-7)"
        BUILD_TAG="$(Build.BuildId)"
        SHA_TAG="git-${SHORT_SHA}"

        FULL_REF_SHA="${FQDN}/${REPO}:${SHA_TAG}"
        FULL_REF_BUILD="${FQDN}/${REPO}:${BUILD_TAG}"
        FULL_REF_LATEST="${FQDN}/${REPO}:latest"

        echo "ACR discovered: $ACR_NAME"
        echo "ACR login server: $FQDN"
        echo "Image SHA tag: $SHA_TAG"
        echo "Image build tag: $BUILD_TAG"
        echo "Canonical reference (for deploy): $FULL_REF_SHA"

        echo "##vso[task.setvariable variable=AcrName]$ACR_NAME"
        echo "##vso[task.setvariable variable=AcrLoginServer]$FQDN"
        echo "##vso[task.setvariable variable=ContainerImageReference]$FULL_REF_SHA"
        echo "##vso[task.setvariable variable=ContainerImageBuildRef]$FULL_REF_BUILD"
        echo "##vso[task.setvariable variable=ContainerImageLatestRef]$FULL_REF_LATEST"

  # ---------------------------------------------------------------------------
  # Build the image locally (no push yet — we scan before push)
  #
  # Build context is backend/ so the file:../shared reference in
  # backend/functions/package.json resolves. Dockerfile path is relative to
  # that context.
  # ---------------------------------------------------------------------------
  - script: |
      set -euo pipefail

      echo "Building Functions container image..."
      docker build \
        -f backend/functions/Dockerfile \
        -t "$(ContainerImageReference)" \
        -t "$(ContainerImageBuildRef)" \
        -t "$(ContainerImageLatestRef)" \
        backend/

      echo "Built tags:"
      docker images "$(AcrLoginServer)/${{ parameters.imageRepository }}" --format "  {{.Repository}}:{{.Tag}}"
    displayName: "docker build pcpc/functions"

  # ---------------------------------------------------------------------------
  # Install Trivy (pinned), scan the locally built image, block on HIGH+ CVE
  # ---------------------------------------------------------------------------
  - script: |
      set -euo pipefail

      TRIVY_VERSION='${{ parameters.trivyVersion }}'
      echo "Installing Trivy ${TRIVY_VERSION}..."
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
        | sh -s -- -b /tmp v${TRIVY_VERSION}
      /tmp/trivy --version
    displayName: "Install Trivy ${{ parameters.trivyVersion }}"

  - script: |
      set -euo pipefail

      echo "=========================================="
      echo "TRIVY CVE SCAN"
      echo "=========================================="
      echo "Image:    $(ContainerImageReference)"
      echo "Severity: ${{ parameters.trivySeverity }} (blocking)"
      echo ""

      /tmp/trivy image \
        --severity '${{ parameters.trivySeverity }}' \
        --exit-code 1 \
        --no-progress \
        --ignore-unfixed \
        --scanners vuln \
        "$(ContainerImageReference)"

      echo ""
      echo "✓ Trivy scan passed — no ${{ parameters.trivySeverity }} CVEs with available fixes"
    displayName: "Trivy CVE scan (blocking)"
    continueOnError: false

  # ---------------------------------------------------------------------------
  # Login to ACR via the Azure CLI (SP token / managed-identity flow) and
  # push all three tags. The ADO SP has AcrPush via the role assignment
  # provisioned in the dev env's Terraform — no Docker registry service
  # connection needed.
  # ---------------------------------------------------------------------------
  - task: AzureCLI@2
    displayName: "az acr login + push (all tags)"
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        echo "Logging into ACR '$(AcrName)' via az CLI..."
        az acr login --name "$(AcrName)"

        echo "Pushing image tags..."
        docker push "$(ContainerImageReference)"
        docker push "$(ContainerImageBuildRef)"
        docker push "$(ContainerImageLatestRef)"
        echo "✓ All tags pushed"

  # ---------------------------------------------------------------------------
  # Capture the pushed digest for downstream use
  # ---------------------------------------------------------------------------
  - script: |
      set -euo pipefail

      DIGEST=$(docker manifest inspect "$(ContainerImageReference)" --verbose 2>/dev/null \
        | jq -r 'if type == "array" then .[0].Descriptor.digest else .Descriptor.digest end')

      if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
        echo "##vso[task.logissue type=warning]Could not capture image digest; deploy will use tag-based reference"
        exit 0
      fi

      echo "Image digest: $DIGEST"
      echo "##vso[task.setvariable variable=ContainerImageDigest]$DIGEST"
    displayName: "Capture image digest"
    continueOnError: true
