# PCPC Pull Request Validation Pipeline
# Fast feedback pipeline for PR validation - NO deployments
# Validates code quality, tests, and infrastructure configuration

trigger: none # PR pipeline only, no CI triggers

pr:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - docs/**
      - README.md
      - .gitignore

pool:
  vmImage: "ubuntu-latest"

variables:
  # Include container image digest variables and ACR service connection
  - template: variables/ci-images.yml
  - name: nodeVersion
    value: "22.x"
  - name: terraformVersion
    value: "1.13.3"

resources:
  containers:
    - container: node22
      image: $(CI_IMAGE_NODE22)
      endpoint: pcpc-acr-service-connection
    - container: terraform
      image: $(CI_IMAGE_TERRAFORM)
      endpoint: pcpc-acr-service-connection

stages:
  # Stage 1: Backend Validation
  - stage: ValidateBackend
    displayName: "Validate Backend"
    jobs:
      - template: templates/validate-backend.yml
        parameters:
          nodeVersion: $(nodeVersion)

  # Stage 2: Infrastructure Validation
  - stage: ValidateInfrastructure
    displayName: "Validate Infrastructure"
    jobs:
      - template: templates/validate-infrastructure.yml
        parameters:
          terraformVersion: $(terraformVersion)

  # Stage 3: APIM Validation
  - stage: ValidateAPIM
    displayName: "Validate APIM"
    jobs:
      - template: templates/validate-apim.yml

  # Stage 4: Summary
  - stage: ValidationSummary
    displayName: "Validation Summary"
    dependsOn:
      - ValidateBackend
      - ValidateInfrastructure
      - ValidateAPIM
    # Runs only when all three validation stages succeeded (the default
    # succeeded() condition evaluated against dependsOn). If any validation
    # fails, this stage is SKIPPED and that failed stage makes the PR red — so
    # the summary can never print a false "passed". This replaces the previous
    # version, which printed $(Agent.JobStatus) (the summary job's OWN status)
    # and unconditionally claimed success (audit finding B2).
    condition: succeeded()
    jobs:
      - job: Summary
        displayName: "PR Validation Summary"
        steps:
          - script: |
              echo "======================================"
              echo "PR Validation Complete"
              echo "======================================"
              echo ""
              echo "All validation stages passed:"
              echo "  - Backend"
              echo "  - Infrastructure"
              echo "  - APIM"
              echo ""
              echo "Frontend (SvelteKit) is validated by Vercel preview builds — see Vercel checks on the PR."
              echo ""
              echo "✅ All validations passed - PR is ready for review"
            displayName: "Display Summary"
