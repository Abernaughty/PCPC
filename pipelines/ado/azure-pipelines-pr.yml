# PCPC Pull Request Validation Pipeline
# Fast feedback pipeline for PR validation - NO deployments
# Validates code quality, tests, and infrastructure configuration

trigger: none # PR pipeline only, no CI triggers

pr:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - docs/**
      - README.md
      - .gitignore

pool:
  vmImage: "ubuntu-latest"

variables:
  # Include container image digest variables and ACR service connection
  - template: variables/ci-images.yml
  - name: nodeVersion
    value: "22.x"
  - name: terraformVersion
    value: "1.13.3"

resources:
  containers:
    - container: node22
      image: $(CI_IMAGE_NODE22)
      endpoint: pcpc-acr-service-connection
    - container: terraform
      image: $(CI_IMAGE_TERRAFORM)
      endpoint: pcpc-acr-service-connection

stages:
  # Stage 1: Backend Validation
  - stage: ValidateBackend
    displayName: "Validate Backend"
    jobs:
      - template: templates/validate-backend.yml
        parameters:
          nodeVersion: $(nodeVersion)

  # Stage 2: Infrastructure Validation
  - stage: ValidateInfrastructure
    displayName: "Validate Infrastructure"
    jobs:
      - template: templates/validate-infrastructure.yml
        parameters:
          terraformVersion: $(terraformVersion)

  # Stage 3: APIM Validation
  - stage: ValidateAPIM
    displayName: "Validate APIM"
    jobs:
      - template: templates/validate-apim.yml

  # Stage 4: Summary
  - stage: ValidationSummary
    displayName: "Validation Summary"
    dependsOn:
      - ValidateBackend
      - ValidateInfrastructure
      - ValidateAPIM
    condition: always()
    # Surface each upstream stage's real result into the summary job. Previously
    # the summary printed $(Agent.JobStatus) (the summary job's OWN status) and
    # unconditionally claimed success, so a failed validation still rendered a
    # green "ready for review" summary (audit finding B2).
    variables:
      backendResult: $[ dependencies.ValidateBackend.result ]
      infraResult: $[ dependencies.ValidateInfrastructure.result ]
      apimResult: $[ dependencies.ValidateAPIM.result ]
    jobs:
      - job: Summary
        displayName: "PR Validation Summary"
        steps:
          - script: |
              echo "======================================"
              echo "PR Validation Complete"
              echo "======================================"
              echo ""
              echo "Validation Results:"
              echo "- Backend:        $(backendResult)"
              echo "- Infrastructure: $(infraResult)"
              echo "- APIM:           $(apimResult)"
              echo ""
              echo "Frontend (SvelteKit) is validated by Vercel preview builds — see Vercel checks on the PR."
              echo ""

              all_ok=true
              for result in "$(backendResult)" "$(infraResult)" "$(apimResult)"; do
                case "$result" in
                  Succeeded|SucceededWithIssues) ;;
                  *) all_ok=false ;;
                esac
              done

              if [ "$all_ok" = "true" ]; then
                echo "✅ All validations passed - PR is ready for review"
              else
                echo "❌ One or more validations did not pass - see the stage results above"
                exit 1
              fi
            displayName: "Display Summary"
